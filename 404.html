<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Ayet Hafızası</title>
<script>
  var path = window.location.pathname;
  // If path has no trailing slash, add it — GitHub Pages serves directory/index.html
  if (!path.endsWith('/')) {
    window.location.replace(path + '/' + window.location.search + window.location.hash);
  } else {
    // Unknown page — go home
    window.location.replace('/Kuran-Arapcasi/');
  }
</script>
</head><body></body></html>
